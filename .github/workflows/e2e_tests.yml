name: Manuell End-to-End Tests
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
    add-runner:
        name: Add one JIT Runner
        runs-on: ubuntu-22.04
        steps:
        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
            role-session-name: Github_Add_Runner
            aws-region: eu-central-1

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2

        - name: Execute Lambda function
          run: |
            aws lambda invoke --function-name register_and_create_runner_container --cli-binary-format raw-in-base64-out --payload '{}' response.json
            cat response.json

    coretest:
      needs: add-runner
      runs-on: self-hosted
      name: Core Tests 3.10
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          id: setup-python
          with:
            python-version: '3.10'
        - name: Run performance test
          run: |
            pip install tox-uv
            tox -e performancetest-py310